<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>172cm 女神計畫 | Abs Awakening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fffafb; color: #334155; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(244,63,94,0.08); margin-bottom: 20px; padding: 24px; border: 1px solid rgba(244,63,94,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { color: #f43f5e; border-bottom: 3px solid #f43f5e; }
        input[type="checkbox"] { width: 26px; height: 26px; accent-color: #f43f5e; cursor: pointer; border-radius: 8px; }
        input[type="number"] { border-bottom: 2px solid #fee2e2; outline: none; padding: 4px; background: transparent; transition: border-color 0.3s; }
        input[type="number"]:focus { border-bottom-color: #f43f5e; }
        .btn-save { background: linear-gradient(135deg, #f43f5e, #fb7185); color: white; padding: 18px; border-radius: 18px; width: 100%; font-weight: 800; box-shadow: 0 8px 20px rgba(244,63,94,0.3); }
        .workout-day-btn { padding: 10px 20px; border-radius: 14px; font-size: 13px; border: 1.5px solid #f43f5e; color: #f43f5e; font-weight: 600; }
        .workout-day-btn.active { background: #f43f5e; color: white; box-shadow: 0 4px 10px rgba(244,63,94,0.2); }
        .progress-container { width: 100%; background: rgba(255,255,255,0.3); height: 6px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-bar { background: white; height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="pb-36">

    <header class="bg-gradient-to-br from-rose-500 via-rose-400 to-orange-400 text-white p-8 text-center rounded-b-[45px] shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-xs font-black tracking-[0.3em] uppercase opacity-90 mb-1">Abs Awakening 90D</h1>
            <div id="day-display" class="text-5xl font-black my-2">DAY 01</div>
            <div class="progress-container"><div id="overall-progress" class="progress-bar" style="width: 1%"></div></div>
            <p class="text-[10px] mt-3 opacity-80 font-medium">TARGET: 110g PROTEIN / 1500 KCAL / 2500ml WATER</p>
        </div>
    </header>

    <main class="p-6">
        <!-- 頁籤 1: 今日打卡 -->
        <section id="dashboard" class="tab-content active">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xl font-bold">🏆 今日進度</h2>
                <span class="text-xs text-slate-400 font-medium">Keep it up, Goddess!</span>
            </div>
            
            <div class="card">
                <div class="flex justify-between items-center mb-5">
                    <span class="font-bold flex items-center">🏋️ <span class="ml-2">重訓課表 (週目標 4 次)</span></span>
                    <span id="workout-count-display" class="font-black text-rose-500 text-xl">0 / 4</span>
                </div>
                <div class="flex justify-between px-2">
                    <input type="checkbox" class="track-check" data-id="w1">
                    <input type="checkbox" class="track-check" data-id="w2">
                    <input type="checkbox" class="track-check" data-id="w3">
                    <input type="checkbox" class="track-check" data-id="w4">
                </div>
            </div>

            <div class="card">
                <div class="flex justify-between items-center mb-5">
                    <span class="font-bold flex items-center text-blue-600">💧 <span class="ml-2">飲水追蹤 (350ml / 格)</span></span>
                    <span id="water-count-display" class="font-black text-blue-500 text-xl">0 / 7</span>
                </div>
                <div class="grid grid-cols-7 gap-3">
                    <input type="checkbox" class="track-check water-node" data-id="d1"> 
                    <input type="checkbox" class="track-check water-node" data-id="d2"> 
                    <input type="checkbox" class="track-check water-node" data-id="d3"> 
                    <input type="checkbox" class="track-check water-node" data-id="d4">
                    <input type="checkbox" class="track-check water-node" data-id="d5"> 
                    <input type="checkbox" class="track-check water-node" data-id="d6">
                    <input type="checkbox" class="track-check water-node" data-id="d7">
                </div>
            </div>

            <button id="main-save-btn" onclick="saveToHistory()" class="btn-save text-lg mt-4 active:scale-95 transition-transform">✨ 紀錄並清空今日狀態</button>
            <p id="save-status" class="text-center mt-4 font-bold text-emerald-500 hidden italic">Success! Data stored in history.</p>
        </section>

        <!-- 頁籤 2: 飲食管理 -->
        <section id="diet" class="tab-content">
            <h2 class="text-xl font-bold mb-4">🥗 蛋白質目標 110g</h2>
            <div class="card">
                <div class="space-y-6">
                    <div class="relative">
                        <label class="text-[10px] font-black text-rose-400 uppercase tracking-widest">Meal 1 (12:00)</label>
                        <input type="number" id="p1" class="p-input text-2xl font-bold w-full" placeholder="0" oninput="calcProtein()">
                        <span class="absolute right-0 bottom-1 text-slate-300 font-bold">g</span>
                    </div>
                    <div class="relative">
                        <label class="text-[10px] font-black text-rose-400 uppercase tracking-widest">Snack (15:30)</label>
                        <input type="number" id="p2" class="p-input text-2xl font-bold w-full" placeholder="0" oninput="calcProtein()">
                        <span class="absolute right-0 bottom-1 text-slate-300 font-bold">g</span>
                    </div>
                    <div class="relative">
                        <label class="text-[10px] font-black text-rose-400 uppercase tracking-widest">Meal 3 (19:30)</label>
                        <input type="number" id="p3" class="p-input text-2xl font-bold w-full" placeholder="0" oninput="calcProtein()">
                        <span class="absolute right-0 bottom-1 text-slate-300 font-bold">g</span>
                    </div>
                </div>

                <div class="mt-10 p-6 bg-slate-900 text-white rounded-[30px] shadow-xl relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="text-xs opacity-60 mb-2 font-medium tracking-widest uppercase text-center">Current Intake</div>
                        <div class="text-5xl font-black text-center mb-4"><span id="total-p-display">0</span> <span class="text-lg text-rose-400">/ 110g</span></div>
                        <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                            <div id="protein-bar" class="bg-gradient-to-r from-rose-500 to-rose-300 h-full transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 頁籤 3: 訓練課表 -->
        <section id="workout" class="tab-content">
            <div class="flex flex-col mb-6">
                <h2 class="text-xl font-bold mb-3">🏋️ Matrix Training</h2>
                <div class="flex gap-2">
                    <button class="workout-day-btn active" id="btn-mon" onclick="setWorkout('mon')">週一</button>
                    <button class="workout-day-btn" id="btn-tue" onclick="setWorkout('tue')">週二</button>
                    <button class="workout-day-btn" id="btn-thu" onclick="setWorkout('thu')">週四</button>
                </div>
            </div>
            <div id="workout-list"></div>
            <div class="card bg-orange-50 border-orange-100 mt-4">
                <p id="cardio-text" class="text-sm text-orange-700 font-bold flex items-center"></p>
            </div>
        </section>

        <!-- 頁籤 4: 歷史紀錄 -->
        <section id="history" class="tab-content">
            <h2 class="text-xl font-bold mb-4">📜 歷史戰績</h2>
            <div id="history-container" class="space-y-4"></div>
            
            <div id="clear-confirm-box" class="hidden mt-8 p-6 bg-rose-50 rounded-[30px] border border-rose-100 text-center">
                <p class="text-sm text-rose-700 font-bold mb-4">⚠️ 確定要重置所有回憶嗎？</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="cancelClear()" class="px-8 py-3 bg-white text-slate-500 rounded-xl text-sm font-bold border border-slate-200">取消</button>
                    <button onclick="executeClear()" class="px-8 py-3 bg-rose-500 text-white rounded-xl text-sm font-bold shadow-md">確定清空</button>
                </div>
            </div>
            
            <button id="btn-clear-trigger" onclick="triggerClear()" class="mt-12 py-4 text-xs font-bold text-slate-300 w-full tracking-[0.2em] hover:text-rose-400">RESET ALL RECORDS</button>
        </section>
    </main>

    <!-- 底部導航 -->
    <nav class="fixed bottom-8 left-6 right-6 bg-slate-900/90 backdrop-blur-xl rounded-[35px] shadow-2xl flex justify-around p-3 border border-white/10">
        <button onclick="showTab('dashboard', this)" class="active-tab flex flex-col items-center w-1/4 pt-2">
            <span class="text-xl">📊</span><span class="text-[9px] font-black uppercase mt-1">Status</span>
        </button>
        <button onclick="showTab('diet', this)" class="text-slate-500 flex flex-col items-center w-1/4 pt-2">
            <span class="text-xl">🥗</span><span class="text-[9px] font-black uppercase mt-1">Diet</span>
        </button>
        <button onclick="showTab('workout', this)" class="text-slate-500 flex flex-col items-center w-1/4 pt-2">
            <span class="text-xl">🏋️</span><span class="text-[9px] font-black uppercase mt-1">Plan</span>
        </button>
        <button onclick="showTab('history', this)" class="text-slate-500 flex flex-col items-center w-1/4 pt-2">
            <span class="text-xl">📜</span><span class="text-[9px] font-black uppercase mt-1">Log</span>
        </button>
    </nav>

    <script>
        // 設定起點日期：2026-04-27
        const START_DATE = new Date('2026-04-27');
        const TOTAL_DAYS = 90;

        const workoutData = {
            mon: { title: "上半身 + 核心平衡", cardio: "🏃 有氧：坡度快走 (坡5, 速6, 20分)", moves: ["滑輪下拉25-4*12", "坐姿推胸15-3*12", "滑輪伐木10-3*15", "懸垂舉腿3*10"] },
            tue: { title: "下半身 + 翹臀燃脂", cardio: "🏃 有氧：慢跑 (速8, 20分)", moves: ["仰臥蹬腿45-4*15", "史密斯深蹲5-3*10", "腿部伸展15-3*15", "平板支撐4*60s" ,  "俄羅斯轉體4-3*20"] },
            thu: { title: "全身爆發 + HIIT", cardio: "🏃 有氧：HIIT (衝30s/走60s, 10回)", moves: ["壺鈴擺盪10-4*20", "坐姿划船20-3*12", "山爬者3*45s", "真空腹訓練5*20"] }
        };

        function updateGlobalProgress() {
            const now = new Date();
            const diffTime = now - START_DATE;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
            const currentDay = Math.max(1, Math.min(diffDays, TOTAL_DAYS));
            
            document.getElementById('day-display').innerText = `DAY ${String(currentDay).padStart(2, '0')}`;
            const percent = (currentDay / TOTAL_DAYS) * 100;
            document.getElementById('overall-progress').style.width = `${percent}%`;
        }

        function initHistory() {
            if (!localStorage.getItem('goddess_history')) {
                const initialData = [
                    {
                        date: "4/27 (一)", protein: "112", workout: "1 / 4", water: "7 / 7",
                        details: [{ name: "開營紀念", sets: ["Day 1 開始！"] }]
                    }
                ];
                localStorage.setItem('goddess_history', JSON.stringify(initialData));
            }
        }

        function getLastRecord(moveName) {
            const history = JSON.parse(localStorage.getItem('goddess_history') || '[]');
            for (let entry of history) {
                if (entry.details) {
                    const move = entry.details.find(d => d.name === moveName);
                    if (move && move.sets && move.sets.length > 0) return move.sets[move.sets.length - 1]; 
                }
            }
            return "New Goal!";
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => { 
                b.classList.remove('active-tab', 'text-rose-500'); 
                b.classList.add('text-slate-500'); 
            });
            el.classList.add('active-tab', 'text-rose-500');
            if(id === 'history') renderHistory();
            window.scrollTo(0, 0);
        }

        function setWorkout(day) {
            document.querySelectorAll('.workout-day-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+day).classList.add('active');
            const d = workoutData[day];
            let html = `<h3 class="font-black text-rose-500 mb-4 text-sm tracking-widest uppercase">Focus: ${d.title}</h3>`;
            
            d.moves.forEach(m => {
                const last = getLastRecord(m);
                html += `
                <div class="card p-5 mb-4 exercise-item">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-base font-black text-slate-800 exercise-name">${m}</span>
                            <div class="text-[10px] text-rose-400 font-bold mt-1 uppercase tracking-tighter">Last: ${last}</div>
                        </div>
                        <button onclick="addSet(this)" class="text-[10px] bg-rose-50 text-rose-500 px-3 py-1.5 rounded-lg font-bold border border-rose-100">+ SET</button>
                    </div>
                    <div class="sets-container space-y-3">
                        <div class="flex gap-2 items-center set-row justify-end">
                            <input type="number" placeholder="0" class="weight-input w-12 text-center text-rose-600 font-bold"> <span class="text-[10px] font-bold text-slate-400">KG</span>
                            <span class="text-xs text-slate-300 mx-1">×</span>
                            <input type="number" placeholder="0" class="reps-input w-12 text-center text-rose-600 font-bold"> <span class="text-[10px] font-bold text-slate-400">REPS</span>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('workout-list').innerHTML = html;
            document.getElementById('cardio-text').innerText = d.cardio;
        }

        function addSet(btn) {
            const container = btn.parentElement.nextElementSibling;
            const setHtml = `
                <div class="flex gap-2 items-center set-row justify-end mt-2 animate-pulse">
                    <input type="number" placeholder="0" class="weight-input w-12 text-center text-rose-600 font-bold"> <span class="text-[10px] font-bold text-slate-400">KG</span>
                    <span class="text-xs text-slate-300 mx-1">×</span>
                    <input type="number" placeholder="0" class="reps-input w-12 text-center text-rose-600 font-bold"> <span class="text-[10px] font-bold text-slate-400">REPS</span>
                </div>`;
            container.insertAdjacentHTML('beforeend', setHtml);
            setTimeout(() => { container.querySelectorAll('.animate-pulse').forEach(r => r.classList.remove('animate-pulse')); }, 400);
        }

        function calcProtein() {
            const p1 = Number(document.getElementById('p1').value) || 0;
            const p2 = Number(document.getElementById('p2').value) || 0;
            const p3 = Number(document.getElementById('p3').value) || 0;
            const total = p1 + p2 + p3;
            document.getElementById('total-p-display').innerText = total;
            const percentage = Math.min((total / 110) * 100, 100);
            document.getElementById('protein-bar').style.width = percentage + '%';
        }

        document.addEventListener('change', (e) => {
            if(e.target.classList.contains('track-check')) {
                const wCount = document.querySelectorAll('#dashboard input[data-id^="w"]:checked').length;
                document.getElementById('workout-count-display').innerText = `${wCount} / 4`;
                const dCount = document.querySelectorAll('.water-node:checked').length;
                document.getElementById('water-count-display').innerText = `${dCount} / 7`;
            }
        });

        function saveToHistory() {
            const pTotal = document.getElementById('total-p-display').innerText;
            const wDisplay = document.getElementById('workout-count-display').innerText;
            const dDisplay = document.getElementById('water-count-display').innerText;
            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()} (${['日','一','二','三','四','五','六'][now.getDay()]})`;

            const workoutDetails = [];
            document.querySelectorAll('.exercise-item').forEach(item => {
                const name = item.querySelector('.exercise-name').innerText;
                const sets = [];
                item.querySelectorAll('.set-row').forEach(row => {
                    const weight = row.querySelector('.weight-input').value;
                    const reps = row.querySelector('.reps-input').value;
                    if (weight || reps) sets.push(`${weight || 0}kg × ${reps || 0}下`);
                });
                if (sets.length > 0) workoutDetails.push({ name, sets });
            });

            const history = JSON.parse(localStorage.getItem('goddess_history') || '[]');
            history.unshift({ date: dateStr, protein: pTotal, workout: wDisplay, water: dDisplay, details: workoutDetails });
            localStorage.setItem('goddess_history', JSON.stringify(history));

            document.getElementById('save-status').classList.remove('hidden');
            setTimeout(() => {
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = '');
                document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
                document.getElementById('total-p-display').innerText = '0';
                document.getElementById('protein-bar').style.width = '0%';
                document.getElementById('workout-count-display').innerText = '0 / 4';
                document.getElementById('water-count-display').innerText = '0 / 7';
                document.getElementById('save-status').classList.add('hidden');
                setWorkout(document.querySelector('.workout-day-btn.active').id.replace('btn-',''));
            }, 1000);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('goddess_history') || '[]');
            const container = document.getElementById('history-container');
            if(history.length === 0) {
                container.innerHTML = '<p class="text-slate-300 text-center py-10 italic">No records found. Start today!</p>';
                return;
            }
            container.innerHTML = history.map(h => `
                <div class="card p-6 border-l-8 border-rose-500">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-black text-slate-800 text-lg">${h.date}</span>
                        <span class="text-[10px] bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full font-black">LOGGED</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div class="bg-rose-50 p-3 rounded-2xl text-center">
                            <div class="text-[9px] font-bold text-rose-400 uppercase">Protein</div>
                            <div class="font-black text-rose-600">${h.protein}g</div>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-2xl text-center">
                            <div class="text-[9px] font-bold text-blue-400 uppercase">Water</div>
                            <div class="font-black text-blue-600">${h.water}</div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl text-center">
                            <div class="text-[9px] font-bold text-slate-400 uppercase">Training</div>
                            <div class="font-black text-slate-600">${h.workout}</div>
                        </div>
                    </div>
                    ${h.details ? `<div class="space-y-2 mt-4 border-t border-slate-50 pt-4">${h.details.map(d => `
                        <div>
                            <span class="text-xs font-bold text-rose-500">◆ ${d.name}</span>
                            <div class="text-[11px] text-slate-500 pl-4 mt-1 leading-relaxed">${d.sets.join('<br>')}</div>
                        </div>`).join('')}</div>` : ''}
                </div>`).join('');
        }

        function triggerClear() {
            document.getElementById('clear-confirm-box').classList.remove('hidden');
            document.getElementById('btn-clear-trigger').classList.add('hidden');
        }

        function cancelClear() {
            document.getElementById('clear-confirm-box').classList.add('hidden');
            document.getElementById('btn-clear-trigger').classList.remove('hidden');
        }

        function executeClear() {
            localStorage.removeItem('goddess_history');
            renderHistory();
            cancelClear();
        }

        // 啟動
        initHistory();
        updateGlobalProgress();
        setWorkout('mon');
    </script>
</body>
</html>
